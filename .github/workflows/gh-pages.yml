name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check if files are in lithium/ directory
        id: check-dir
        run: |
          if [ -d "lithium" ] && [ -f "lithium/index.html" ]; then
            echo "FILES_IN_LITHIUM=true" >> $GITHUB_OUTPUT
            echo "✅ Found files in lithium/ directory"
          else
            echo "FILES_IN_LITHIUM=false" >> $GITHUB_OUTPUT
            echo "❌ No lithium/ directory with index.html found"
          fi

      - name: Prepare files for deployment
        run: |
          # Create deployment directory
          mkdir -p _site
          
          # Copy files based on structure
          if [ "${{ steps.check-dir.outputs.FILES_IN_LITHIUM }}" == "true" ]; then
            echo "Copying from lithium/ directory..."
            cp -r lithium/* _site/
          else
            echo "Copying from root directory..."
            cp -r * _site/ 2>/dev/null || :
            cp -r .[!.]* _site/ 2>/dev/null || :
          fi
          
          # Verify critical files
          echo "=== Deployed files ==="
          ls -la _site/
          
          # Check for required files
          if [ ! -f "_site/index.html" ]; then
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
          
          if [ ! -f "_site/lithium-js/lithium.mjs" ] && [ ! -f "lithium-js/lithium.mjs" ]; then
            echo "⚠️ Warning: lithium.mjs might be missing"
          fi
          
          echo "✅ Build complete"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
